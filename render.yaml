services:
  - type: web
    name: twa-contact-manager
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DATABASE_PATH
        value: /tmp/contact_manager.db
      - key: PYTHONUNBUFFERED
        value: "1"
